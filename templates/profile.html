{% extends "base.html" %}
{% block title %}الملف الشخصي{% endblock %}
{% block content %}
<h1>تعديل بيانات المستخدم</h1>
<form method="POST" action="{{ url_for('profile') }}" class="auth-form">
    <div class="form-group">
        <label for="name">الاسم</label>
        <input type="text" id="name" name="name" value="{{ user.name }}" required>
    </div>
    <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" name="email" value="{{ user.email }}" required>
    </div>
    <div class="form-group">
        <label for="password">كلمة المرور الجديدة (اتركها فارغة للإبقاء على الحالية)</label>
        <input type="password" id="password" name="password" placeholder="6 أحرف على الأقل">
    </div>
    <button type="submit" class="btn btn-primary">حفظ التغييرات</button>
</form>
{% endblock %}
